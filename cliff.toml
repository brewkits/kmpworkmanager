[changelog]
header = """
# Changelog

All notable changes to KMP WorkManager will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

"""

body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group }}
{% for commit in commits %}
- {% if commit.breaking %}**BREAKING** {% endif %}{{ commit.message | upper_first }} \
([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/brewkits/kmpworkmanager/commit/{{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""

trim = true

footer = ""

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false

# Map commit types to changelog section headers
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^security|^sec", group = "Security" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^change|^chng", group = "Changed" },
    { message = "^deprecat", group = "Deprecated" },
    { message = "^remov|^delet", group = "Removed" },
    { message = "^test", group = "Tests" },
    { message = "^doc", group = "Documentation" },
    { message = "^chore\\(release\\)|^release", skip = true },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^style", skip = true },
    { message = "^build", skip = true },
]

# Do not include commits with these messages
filter_commits = false

# Sort commits inside sections by oldest first
sort_commits = "oldest"

# Protect breaking changes from being grouped under Changed
protect_breaking_commits = true

# Parse links from commit messages (e.g. "Closes #123")
link_parsers = [
    { pattern = "#(\\d+)", href = "https://github.com/brewkits/kmpworkmanager/issues/$1" },
]

# Include all tags that match this pattern
tag_pattern = "v[0-9].*"
skip_tags = "v0\\..*"

# Exclude tags that match this pattern from the previous tag in a release
ignore_tags = ""
