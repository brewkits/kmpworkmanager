name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      dry_run:
        description: 'Dry run — build bundle but do NOT commit/tag/release'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0   # full history required for git-cliff CHANGELOG

      # ── 2. Java ───────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 3. Compute new version ────────────────────────────────────────────────
      - name: Compute new version
        id: version
        run: |
          CURRENT=$(grep '^VERSION_NAME=' gradle.properties | cut -d= -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump_type }}" in
            major) NEW="$((MAJOR + 1)).0.0" ;;
            minor) NEW="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW"         >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW}"      >> "$GITHUB_OUTPUT"
          echo "bump_type=${{ inputs.bump_type }}" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW (${{ inputs.bump_type }})"

      # ── 4. Bump version in gradle.properties ─────────────────────────────────
      - name: Bump version
        run: |
          sed -i '' "s/^VERSION_NAME=.*/VERSION_NAME=${{ steps.version.outputs.new }}/" gradle.properties
          echo "gradle.properties now contains:"
          grep VERSION_NAME gradle.properties

      # ── 5. Generate CHANGELOG with git-cliff ─────────────────────────────────
      - name: Install git-cliff
        run: brew install git-cliff

      - name: Generate CHANGELOG
        run: |
          git-cliff \
            --config cliff.toml \
            --tag "${{ steps.version.outputs.tag }}" \
            --output CHANGELOG.md
          echo "--- CHANGELOG preview (first 60 lines) ---"
          head -60 CHANGELOG.md

      # ── 5b. Build the public release-notes body from this version's changelog ─
      # The GitHub Release body must summarise what changed — NOT internal publish
      # steps. We extract just the new version's section (git-cliff --latest) and
      # append the install snippet.
      - name: Build release notes
        run: |
          git-cliff --config cliff.toml --tag "${{ steps.version.outputs.tag }}" --latest --strip all > release_notes_body.md
          {
            echo ""
            echo "## Install"
            echo ""
            echo '```kotlin'
            echo 'implementation("dev.brewkits:kmpworkmanager:${{ steps.version.outputs.new }}")          // core engine (no Ktor)'
            echo 'implementation("dev.brewkits:kmpworkmanager-http:${{ steps.version.outputs.new }}")     // optional — Ktor 3 HTTP workers'
            echo '```'
          } >> release_notes_body.md
          echo "--- release notes body ---"
          cat release_notes_body.md

      # ── 6. Commit + tag (skip on dry run) ────────────────────────────────────
      - name: Commit and tag
        if: ${{ inputs.dry_run == false }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gradle.properties CHANGELOG.md
          git commit -m "release: ${{ steps.version.outputs.tag }}"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

      # ── 7. Build, sign and bundle all three modules ──────────────────────────
      #
      # The root `generateFullMavenZip` task is the single source of truth:
      #   - depends on `publishAllPublicationsToMavenCentralLocalRepository`
      #     for every module (kmpworker, kmpworker-annotations, kmpworker-ksp)
      #   - generates MD5 / SHA1 / SHA256 / SHA512 checksums for every artifact
      #     (the Sonatype Central Portal requires MD5 + SHA1; the longer hashes
      #     are nice-to-have for downstream verification)
      #   - produces `build/distributions/kmpworkmanager-maven-central-<v>.zip`
      #
      # Signing keys come from repo secrets:
      #   SIGNING_KEY_BASE64  — armored PGP private key, base64-encoded
      #   SIGNING_PASSWORD    — passphrase for that key
      # The signing plugin in each module reads them via `-Psigning.key` /
      # `-Psigning.password`. Without the secrets the `signing { isRequired = ... }`
      # block skips signing — fine for dry-run, fatal for a real Central upload.
      - name: Clean prior staging
        # The staging dir is reused across local builds. If a previous run with
        # a different version is still on disk the ZIP would contain BOTH
        # versions. CI starts from a fresh checkout but the build dir can be
        # restored from the Gradle cache — clean explicitly.
        run: rm -rf build/maven-central-staging build/distributions

      - name: Build, sign and bundle (root :generateFullMavenZip)
        env:
          SIGNING_KEY:      ${{ secrets.SIGNING_KEY_BASE64 }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          VERSION_NAME:     ${{ steps.version.outputs.new }}
        run: |
          ./gradlew generateFullMavenZip \
            -PVERSION_NAME="$VERSION_NAME" \
            -Psigning.key="$SIGNING_KEY" \
            -Psigning.password="$SIGNING_PASSWORD" \
            --no-configuration-cache --stacktrace

      # ── 8. Verify bundle structure and locate the ZIP ────────────────────────
      - name: Verify bundle
        id: bundle
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.new }}"
          STAGING_DIR="build/maven-central-staging"
          BUNDLE_NAME="kmpworkmanager-maven-central-${VERSION}.zip"
          BUNDLE_PATH="build/distributions/${BUNDLE_NAME}"

          if [ ! -d "${STAGING_DIR}/dev/brewkits" ]; then
            echo "::error::Staging dir missing: ${STAGING_DIR}/dev/brewkits"
            ls -la "${STAGING_DIR}" || true
            exit 1
          fi

          if [ ! -f "${BUNDLE_PATH}" ]; then
            echo "::error::Bundle ZIP missing: ${BUNDLE_PATH}"
            ls -la build/distributions/ || true
            exit 1
          fi

          # Sanity: every artifact (jar/aar/klib/pom/module) must have a
          # matching .asc signature and the basic MD5 + SHA1 checksums.
          ARTIFACTS=$(find "${STAGING_DIR}/dev/brewkits" -type f \
            \( -name "*.jar" -o -name "*.aar" -o -name "*.klib" \
               -o -name "*.pom" -o -name "*.module" -o -name "*.json" \) \
            ! -name "*.asc" ! -name "*.md5" ! -name "*.sha1" \
            ! -name "*.sha256" ! -name "*.sha512" | wc -l | tr -d ' ')
          SIGNATURES=$(find "${STAGING_DIR}/dev/brewkits" -type f -name "*.asc" | wc -l | tr -d ' ')
          MD5S=$(find "${STAGING_DIR}/dev/brewkits" -type f -name "*.md5" | wc -l | tr -d ' ')
          SHA1S=$(find "${STAGING_DIR}/dev/brewkits" -type f -name "*.sha1" | wc -l | tr -d ' ')

          echo "Artifacts:  $ARTIFACTS"
          echo "Signatures: $SIGNATURES (.asc)"
          echo "MD5:        $MD5S"
          echo "SHA1:       $SHA1S"

          # `isRequired` in the signing plugin lets the build succeed without a
          # PGP key (for dry-run / fork CI). For a real release the secrets MUST
          # be present, so the signature count must equal the artifact count.
          if [ -n "${{ secrets.SIGNING_KEY_BASE64 }}" ] && [ "$ARTIFACTS" -ne "$SIGNATURES" ]; then
            echo "::error::artifact count ($ARTIFACTS) != signature count ($SIGNATURES) — signing did not cover every artifact"
            exit 1
          fi
          # Every artifact must carry .md5 + .sha1, but the bundle also checksums
          # non-"artifact" files (maven-metadata.xml, etc.), so the checksum count is
          # legitimately HIGHER than the artifact count. Fail only when checksums are
          # MISSING (fewer than artifacts), not when there are extras.
          if [ "$MD5S" -lt "$ARTIFACTS" ] || [ "$SHA1S" -lt "$ARTIFACTS" ]; then
            echo "::error::checksums missing — every artifact must have .md5 and .sha1 (Sonatype Central requirement). artifacts=$ARTIFACTS md5=$MD5S sha1=$SHA1S"
            exit 1
          fi

          BUNDLE_SIZE=$(du -h "${BUNDLE_PATH}" | cut -f1)
          TOTAL_FILES=$(unzip -l "${BUNDLE_PATH}" | tail -1 | awk '{print $2}')

          echo "bundle_name=${BUNDLE_NAME}" >> "$GITHUB_OUTPUT"
          echo "bundle_path=${BUNDLE_PATH}" >> "$GITHUB_OUTPUT"
          echo "bundle_size=${BUNDLE_SIZE}" >> "$GITHUB_OUTPUT"
          echo "total_files=${TOTAL_FILES}" >> "$GITHUB_OUTPUT"
          echo "artifacts=${ARTIFACTS}"     >> "$GITHUB_OUTPUT"
          echo "signatures=${SIGNATURES}"   >> "$GITHUB_OUTPUT"

          echo "Bundle OK: ${BUNDLE_NAME} (${BUNDLE_SIZE}, ${TOTAL_FILES} files, ${ARTIFACTS} artifacts × ${SIGNATURES} sigs)"

      # ── 9. Upload bundle as workflow artifact (always, including dry run) ─────
      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.bundle.outputs.bundle_name }}
          path: ${{ steps.bundle.outputs.bundle_path }}
          retention-days: 30

      # ── 10. Create GitHub Release with bundle attached (skip on dry run) ──────
      # The public release body is this version's changelog (built in step 5b),
      # NOT the internal Maven Central upload steps — those go to the run summary
      # below, visible only to maintainers in the Actions UI.
      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body_path: release_notes_body.md
          files: ${{ steps.bundle.outputs.bundle_path }}
          draft: false
          prerelease: false

      # ── 11. Maven Central upload steps → run summary (maintainer-only) ────────
      # Maven Central upload is intentionally manual — release.yml only builds and
      # signs the bundle. These instructions are private (Actions run summary), so
      # they never leak into the public release notes.
      - name: Maven Central upload instructions (run summary)
        if: ${{ inputs.dry_run == false }}
        run: |
          {
            echo "## 📦 Maven Central upload (manual)"
            echo ""
            echo "1. Download **${{ steps.bundle.outputs.bundle_name }}** from the [release assets](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }})"
            echo "2. https://central.sonatype.com/ → **Publish** → **Upload Bundle** → upload the ZIP"
            echo "3. Validation ~1-2 min → click **Publish** → live on Maven Central in ~15-30 min"
            echo ""
            echo "Bundle: \`${{ steps.bundle.outputs.bundle_name }}\` · ${{ steps.bundle.outputs.bundle_size }} · ${{ steps.bundle.outputs.artifacts }} artifacts × ${{ steps.bundle.outputs.signatures }} sigs"
          } >> "$GITHUB_STEP_SUMMARY"
