name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set VERSION_NAME from git tag
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0-SNAPSHOT")
          echo "VERSION_NAME=$VERSION" >> gradle.properties
          echo "VERSION_NAME set to: $VERSION"

      - name: Build library
        run: ./gradlew :kmpworker:build

      - name: Run tests
        run: ./gradlew :kmpworker:allTests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            kmpworker/build/reports/tests/
            kmpworker/build/test-results/
          retention-days: 7

      - name: Build demo app (Android)
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            kmpworker/build/libs/
            kmpworker/build/outputs/aar/
