name: CI

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Configure gradle.properties for CI
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0-SNAPSHOT")
          cat >> gradle.properties <<EOF
          VERSION_NAME=$VERSION
          android.useAndroidX=true
          android.enableJetifier=false
          kotlin.mpp.androidSourceSetLayoutVersion=2
          org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8
          kotlin.daemon.jvm.options=-Xmx4096m
          org.gradle.parallel=true
          org.gradle.caching=true
          EOF
          echo "gradle.properties configured with VERSION_NAME=$VERSION"

      - name: Build library
        run: ./gradlew :kmpworker:build

      - name: Run tests
        run: ./gradlew :kmpworker:allTests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            kmpworker/build/reports/tests/
            kmpworker/build/test-results/
          retention-days: 7

      - name: Build demo app (Android)
        run: ./gradlew :composeApp:assembleDebug

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            kmpworker/build/libs/
            kmpworker/build/outputs/aar/
