version: 2
updates:
  # Gradle (Kotlin Multiplatform, Android, KSP, Compose, Ktor, Koin, Okio, …)
  - package-ecosystem: "gradle"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "gradle"
    # Group routine version bumps so the PR queue stays sane. Security updates
    # always get their own PR regardless of grouping.
    groups:
      kotlin-toolchain:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlin.plugin*"
          - "com.google.devtools.ksp*"
      ktor:
        patterns:
          - "io.ktor:*"
      coroutines:
        patterns:
          - "org.jetbrains.kotlinx:kotlinx-coroutines*"
      androidx:
        patterns:
          - "androidx.*"
      compose:
        patterns:
          - "org.jetbrains.compose*"
          - "org.jetbrains.compose.*"
    ignore:
      # Kotlin in a KMP project requires coordinated KGP / KSP / Compose-compiler
      # bumps — even a MINOR Kotlin bump (e.g. 2.1 -> 2.4) can break the build.
      # Keep these manual; ignore both major and minor (patch updates still flow).
      - dependency-name: "org.jetbrains.kotlin:*"
        update-types: [ "version-update:semver-major", "version-update:semver-minor" ]
      # KSP version is pinned to the Kotlin version (e.g. 2.1.21-2.0.1); a major
      # KSP bump implies a Kotlin bump — handle alongside Kotlin, manually.
      - dependency-name: "com.google.devtools.ksp:*"
        update-types: [ "version-update:semver-major" ]
      # Ktor majors are migrations, not one-liners (2 -> 3 was a whole release).
      # Patch/minor still flow through the grouped PR for review.
      - dependency-name: "io.ktor:*"
        update-types: [ "version-update:semver-major" ]
      # AGP majors break Gradle compatibility — handle manually.
      - dependency-name: "com.android.tools.build:gradle"
        update-types: [ "version-update:semver-major" ]

  # GitHub Actions used by .github/workflows/*.yml
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Ho_Chi_Minh"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
